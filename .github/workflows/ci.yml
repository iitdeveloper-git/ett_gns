name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gns_test
          POSTGRES_USER: gns
          POSTGRES_PASSWORD: gns
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U gns -d gns_test"
          --health-interval 5s --health-timeout 5s --health-retries 20
      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports: ["5672:5672"]
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      GNS_ENVIRONMENT: test
      GNS_ALLOW_DEV_IDENTITY: "true"
      GNS_API_KEY_PEPPER: ci-api-key-pepper-change-me
      GNS_PROVIDER_SECRET_KEY: ci-provider-secret-change-me
      GNS_DATABASE_URL: postgresql+psycopg://gns:gns@localhost:5432/gns_test
      GNS_BROKER_URL: amqp://guest:guest@localhost:5672//
      GNS_RESULT_BACKEND_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy ett_gns_app
      - run: alembic upgrade head
      - run: alembic check
      - run: pytest --cov=ett_gns_app --cov-report=xml --cov-report=term-missing --cov-fail-under=75
      - run: pip-audit -r requirements.txt
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: gns-api:ci
          load: true
      - uses: docker/build-push-action@v6
        with:
          context: ./admin
          push: false
          tags: gns-admin:ci
          load: true
      - uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: gns-api:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
      - uses: anchore/sbom-action@v0
        with:
          image: gns-api:ci
          artifact-name: gns-api.spdx.json

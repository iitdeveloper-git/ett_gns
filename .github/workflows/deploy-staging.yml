name: Deploy staging

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate required staging configuration
        env:
          STAGING_DEPLOY_HOOK: ${{ secrets.STAGING_DEPLOY_HOOK }}
        run: test -n "$STAGING_DEPLOY_HOOK"
      - name: Trigger managed-container deployment
        env:
          STAGING_DEPLOY_HOOK: ${{ secrets.STAGING_DEPLOY_HOOK }}
        run: curl --fail-with-body --retry 3 -X POST "$STAGING_DEPLOY_HOOK"

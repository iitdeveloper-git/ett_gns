services:
  - type: web
    name: gns-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/ready
    envVars: &backend-env
      - key: GNS_ENVIRONMENT
        value: staging
      - key: GNS_ALLOW_DEV_IDENTITY
        value: "false"
      - key: GNS_DATABASE_URL
        fromDatabase: {name: gns-postgres, property: connectionString}
      - key: GNS_RESULT_BACKEND_URL
        fromService: {type: redis, name: gns-redis, property: connectionString}
      - key: GNS_BROKER_URL
        sync: false
      - key: GNS_API_KEY_PEPPER
        generateValue: true
      - key: GNS_PROVIDER_SECRET_KEY
        generateValue: true
      - key: GNS_OIDC_ISSUER
        sync: false
      - key: GNS_OIDC_AUDIENCE
        sync: false

  - type: worker
    name: gns-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A ett_gns_app.tasks.celery_app worker --loglevel=INFO --queues=notifications.default --concurrency=4
    envVars: *backend-env

  - type: worker
    name: gns-outbox
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m ett_gns_app.cli outbox
    envVars: *backend-env

  - type: worker
    name: gns-scheduler
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A ett_gns_app.tasks.celery_app beat --loglevel=INFO
    envVars: *backend-env

  - type: web
    name: gns-admin
    runtime: docker
    rootDir: admin
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NEXT_PUBLIC_GNS_API_URL
        sync: false

  - type: redis
    name: gns-redis
    ipAllowList: []

databases:
  - name: gns-postgres
    databaseName: gns
    user: gns
    plan: basic-256mb
